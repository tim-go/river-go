name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build app and validate platform config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate platform template
        run: RIVER_GO_PLATFORM_CONFIG=config/templates/river-go-platform.json npm run platform:check

      - name: Build
        run: npm run build
