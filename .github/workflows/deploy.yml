name: Deploy

# Continuous deployment for RiverLaunch.app. Reuses the platform/*.sh scripts
# (the same ones used for manual deploys) so there is a single source of truth.
#
# Staging auto-deploys on push to main, but ONLY after the one-time setup in
# docs/development/deployment.md is done and the repo variable
# STAGING_DEPLOY_ENABLED is set to "true". Production is manual only.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging, prod]
        default: staging
      live:
        description: Deploy Hosting live (otherwise a preview channel)
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.environment || 'staging' }}
    # Manual runs are always allowed; auto push-to-main staging deploys only run
    # once you opt in by setting the STAGING_DEPLOY_ENABLED repo variable.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.STAGING_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || 'staging' }}
      LIVE: ${{ github.event.inputs.live }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix api ci

      - name: Authenticate to Google Cloud (service account key)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # SA-key auth. firebase-tools can't use WIF external-account credentials
          # (firebase/firebase-tools#10726), but it accepts a real SA key via the
          # GOOGLE_APPLICATION_CREDENTIALS the auth action exports — which gcloud,
          # migrate, the Cloud Run deploy, and firebase deploy then all use. Interim,
          # while keyless WIF for firebase-tools is unsupported upstream.
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -sSL -o /usr/local/bin/cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
          sudo chmod +x /usr/local/bin/cloud-sql-proxy

      - name: Install Firebase CLI
        # Pinned for reproducible CI. Auth is the SA-key GOOGLE_APPLICATION_CREDENTIALS
        # exported by the auth step (firebase-tools accepts a real SA key).
        run: npm install -g firebase-tools@15.22.1

      - name: Materialise platform config from secrets
        env:
          PLATFORM_JSON: ${{ secrets.RIVER_GO_PLATFORM_CONFIG }}
          RUNTIME_JSON: ${{ secrets.RIVER_GO_RUNTIME_CONFIG }}
        run: |
          if [ -z "$PLATFORM_JSON" ] || [ -z "$RUNTIME_JSON" ]; then
            echo "::error::RIVER_GO_PLATFORM_CONFIG / RIVER_GO_RUNTIME_CONFIG secrets are not set for the '$DEPLOY_ENV' environment. See docs/development/deployment.md."
            exit 1
          fi
          mkdir -p platform/.config
          printf '%s' "$PLATFORM_JSON" > platform/.config/river-go-platform.json
          printf '%s' "$RUNTIME_JSON" > platform/.config/river-go-runtime.json

      - name: Run database migrations
        run: npm run "platform:migrate:$DEPLOY_ENV"

      - name: Deploy API to Cloud Run
        run: npm run "platform:deploy-api:$DEPLOY_ENV"

      - name: Build web app
        run: npm run "platform:deploy-web:$DEPLOY_ENV" -- --build-only

      - name: Resolve Firebase project, target, channel
        id: fb
        run: |
          echo "project=$(jq -r ".environments.$DEPLOY_ENV.firebaseProject" platform/.config/river-go-platform.json)" >> "$GITHUB_OUTPUT"
          echo "target=$(jq -r ".environments.$DEPLOY_ENV.firebaseHostingSite" platform/.config/river-go-platform.json)" >> "$GITHUB_OUTPUT"
          # Push-to-main / live input deploys live; otherwise a per-run preview channel.
          if [ "$GITHUB_EVENT_NAME" = "push" ] || [ "${LIVE:-false}" = "true" ]; then
            echo "channel=live" >> "$GITHUB_OUTPUT"
          else
            echo "channel=preview-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture live release before deploy
        id: prevlive
        if: steps.fb.outputs.channel == 'live'
        run: |
          token="$(gcloud auth print-access-token)"
          v="$(curl -sS -H "Authorization: Bearer $token" \
            "https://firebasehosting.googleapis.com/v1beta1/sites/${{ steps.fb.outputs.target }}/channels/live" \
            | jq -r '.release.version.name // ""')"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Live version before deploy: ${v:-<none>}"

      - name: Deploy web to Firebase Hosting
        id: deploy
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: ${{ steps.fb.outputs.project }}
          channelId: ${{ steps.fb.outputs.channel }}
          target: ${{ steps.fb.outputs.target }}

      - name: Confirm Hosting deploy
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          CHANNEL: ${{ steps.fb.outputs.channel }}
          SITE: ${{ steps.fb.outputs.target }}
          PREV_VERSION: ${{ steps.prevlive.outputs.version }}
        run: |
          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            echo "Deploy action succeeded."
            exit 0
          fi
          # A preview-channel failure is real (the live release-retry quirk below
          # only affects the live channel).
          if [ "$CHANNEL" != "live" ]; then
            echo "::error::Firebase Hosting preview deploy failed."
            exit 1
          fi
          # Known false-failure: the action releases the new version to live, then
          # firebase-tools retries the release POST after a "premature close" network
          # error and the retry fails with FAILED_PRECONDITION because the version is
          # already active from the successful first attempt. Confirm the live release
          # actually advanced to a new version; if so the deploy genuinely succeeded.
          token="$(gcloud auth print-access-token)"
          now="$(curl -sS -H "Authorization: Bearer $token" \
            "https://firebasehosting.googleapis.com/v1beta1/sites/$SITE/channels/live" \
            | jq -r '.release.version.name // ""')"
          echo "Live version before: ${PREV_VERSION:-<none>}"
          echo "Live version after:  ${now:-<none>}"
          if [ -n "$now" ] && [ "$now" != "$PREV_VERSION" ]; then
            echo "::notice::Deploy action reported failure, but the live release advanced — the new build is live (firebase-tools release-retry false-failure). Treating as success."
            exit 0
          fi
          echo "::error::Firebase Hosting deploy failed and the live release did not advance."
          exit 1
